<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ page.title | default: site.title }} | Clinical AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #00D179;
            --primary-blue: #007AFF;
            --danger-red: #FF3B30;
            --pure-white: #FFFFFF;
            --bg-body: #F9FAFB;
            --text-main: #111827;
            --text-muted: #6B7280;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --border-soft: rgba(0, 0, 0, 0.05);
            --health-color: var(--primary-green);
            --transition-premium: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --p-padding: 40px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }
        [lang="ar"] * { font-family: 'IBM Plex Sans Arabic', sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; line-height: 1.5; cursor: none; }

        /* --- Custom Magnetic Cursor --- */
        #cursor { width: 22px; height: 22px; background: rgba(0, 122, 255, 0.25); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transition: transform 0.12s ease-out, background 0.3s; mix-blend-mode: multiply; backdrop-filter: invert(0.1); }
        #cursor.hovered { transform: scale(3.5); background: rgba(0, 122, 255, 0.08); }
        @media (max-width: 1024px) { body { cursor: auto; } #cursor { display: none; } }

        /* --- 3D Neural Canvas --- */
        #neural-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.15; }

        .noise { position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); opacity: 0.02; pointer-events: none; z-index: 1000; }
        .ambient-blur { position: fixed; width: 60vw; height: 60vw; background: var(--primary-blue); filter: blur(160px); opacity: 0.06; border-radius: 50%; z-index: -1; top: -10vw; left: -10vw; will-change: transform; transition: transform 0.2s linear; }

        /* --- Shared Components --- */
        .premium-card { background: var(--glass-bg); backdrop-filter: blur(25px) saturate(200%); border: 1px solid rgba(255,255,255,0.4); border-radius: 36px; padding: var(--p-padding); transition: var(--transition-premium); box-shadow: 0 10px 40px rgba(0,0,0,0.02); position: relative; overflow: hidden; }
        .premium-card::before { content: ''; position: absolute; inset: 0; border: 1px solid rgba(0,0,0,0.03); border-radius: inherit; pointer-events: none; }
        .premium-card:hover { transform: translateY(-5px); box-shadow: 0 30px 60px rgba(0,0,0,0.04); }

        .btn-premium { background: var(--text-main); color: var(--pure-white); border: none; padding: 20px 40px; border-radius: 100px; font-weight: 600; font-size: 1.05rem; cursor: pointer; transition: var(--transition-premium); display: inline-flex; align-items: center; gap: 14px; white-space: nowrap; will-change: transform; }
        .btn-premium:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 25px 50px rgba(0,0,0,0.12); }

        /* --- Transitions --- */
        .app-layer { position: fixed; inset: 0; z-index: 1000; background: var(--bg-body); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .app-layer.hidden { opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); filter: blur(20px); }

        /* --- Toast System --- */
        #toast-box { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: #000; color: #fff; padding: 18px 36px; border-radius: 100px; font-weight: 700; box-shadow: 0 15px 45px rgba(0,0,0,0.2); animation: toastPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.error { background: var(--danger-red); }
        @keyframes toastPop { from { opacity: 0; transform: translateY(-30px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Master Responsive */
        @media (max-width: 768px) {
            :root { --p-padding: 24px; }
            .premium-card { border-radius: 28px; }
            .btn-premium { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <canvas id="neural-canvas"></canvas>
    <div class="noise"></div>
    <div class="ambient-blur" id="blur"></div>

    {{ content }}

    <div id="toast-box"></div>

    <script>
        // --- 1. Master Canvas Particles ---
        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        for(let i=0; i<80; i++) pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5 });
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = 'rgba(0,122,255,0.2)'; ctx.lineWidth = 1;
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                pts.forEach(p2 => {
                    let d = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(d < 150) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                });
            });
            requestAnimationFrame(draw);
        }
        draw();

        // --- 2. Magnetic Interaction ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            const blur = document.getElementById('blur');
            blur.style.transform = `translate(${e.clientX * 0.05}px, ${e.clientY * 0.05}px)`;
        });

        document.querySelectorAll('button, .premium-card').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
            el.addEventListener('mousemove', (e) => {
                if(el.classList.contains('btn-premium')) {
                    const rect = el.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width/2;
                    const y = e.clientY - rect.top - rect.height/2;
                    el.style.transform = `translate(${x*0.15}px, ${y*0.35}px) scale(1.05)`;
                }
            });
            el.addEventListener('mouseleave', () => { el.style.transform = ''; });
        });

        // --- 3. Clinical Scramble ---
        function scrambleText(id, target, speed=30) {
            const el = document.getElementById(id);
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let iters = 0;
            const interval = setInterval(() => {
                el.innerText = target.split("").map((c, idx) => {
                    if(idx < iters) return target[idx];
                    return chars[Math.floor(Math.random()*chars.length)];
                }).join("");
                if(iters >= target.length) clearInterval(interval);
                iters += 1/3;
            }, speed);
        }

        // --- 4. Global Toasts ---
        function showToast(msg, isErr=false) {
            const box = document.getElementById('toast-box');
            const t = document.createElement('div');
            t.className = `toast ${isErr ? 'error' : ''}`;
            t.textContent = msg;
            box.appendChild(t);
            setTimeout(() => t.remove(), 4000);
        }
    </script>
</body>
</html>
